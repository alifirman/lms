<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow LMS - Platform Pembelajaran Modern</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-mesh min-h-screen flex flex-col items-center justify-center p-4">
    
    <!-- Header/Logo -->
    <div class="mb-12 text-center animate-fadeIn">
        <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-2xl shadow-indigo-500/20">
            <i class="fas fa-graduation-cap text-white text-3xl"></i>
        </div>
        <h1 class="text-4xl font-extrabold text-white tracking-tight">EduFlow<span class="text-indigo-400">LMS</span></h1>
        <p class="text-slate-400 mt-2 font-medium">Platform Pembelajaran Modern Terintegrasi</p>
    </div>

    <!-- Login Card -->
    <div class="glass-card w-full max-w-md p-8 rounded-3xl animate-fadeIn" style="animation-delay: 0.1s">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-white">Login</h2>
            <p class="text-slate-400 text-sm mt-1">Masuk dengan akun yang sudah terdaftar</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-user text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
                    </div>
                    <input type="text" id="username" required 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-900/50 border border-white/5 rounded-2xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 transition-all"
                        placeholder="admin / guru1 / siswa1">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
                    </div>
                    <input type="password" id="password" required 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-900/50 border border-white/5 rounded-2xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500/50 transition-all"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" class="w-4 h-4 rounded border-white/10 bg-slate-900/50 text-indigo-500 focus:ring-indigo-500/20">
                    <span class="text-xs text-slate-400 group-hover:text-slate-300 transition-colors">Ingat saya</span>
                </label>
                <a href="#" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium">Lupa password?</a>
            </div>

            <button type="submit" id="login-btn"
                class="w-full py-4 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold rounded-2xl shadow-xl shadow-indigo-500/20 transition-all hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Masuk Sekarang</span>
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/5 text-center">
            <p class="text-xs text-slate-500 uppercase tracking-widest mb-4 font-semibold">Coba Demo Akun</p>
            <div class="flex items-center justify-center gap-3">
                <button onclick="fillDemo('admin', 'admin123')" class="px-3 py-1.5 rounded-lg bg-white/5 text-slate-400 text-[10px] font-bold hover:bg-white/10 hover:text-white transition-all">ADMIN</button>
                <button onclick="fillDemo('guru1', 'guru123')" class="px-3 py-1.5 rounded-lg bg-white/5 text-slate-400 text-[10px] font-bold hover:bg-white/10 hover:text-white transition-all">GURU</button>
                <button onclick="fillDemo('siswa1', 'siswa123')" class="px-3 py-1.5 rounded-lg bg-white/5 text-slate-400 text-[10px] font-bold hover:bg-white/10 hover:text-white transition-all">SISWA</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <p class="mt-12 text-slate-600 text-[10px] font-medium tracking-[0.2em] uppercase">© 2026 EduFlow Learning System. Seluruh Hak Cipta Dilindungi.</p>

    <!-- JS Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Set loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> <span>Tunggu sebentar...</span>';
            
            try {
                const res = await Auth.login(username, password);
                if (res.success) {
                    showToast('Berhasil masuk! Mengalihkan...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showToast(res.error || 'Username atau password salah', 'error');
                }
            } catch (err) {
                showToast('Terjadi kesalahan server', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Masuk Sekarang</span> <i class="fas fa-arrow-right text-xs"></i>';
            }
        });

        function fillDemo(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
        }
    </script>
</body>
</html>
