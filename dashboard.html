<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0b1121] min-h-screen text-slate-300 overflow-x-hidden">

    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden" onclick="Router.toggleSidebar()"></div>

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#0f172a]/80 backdrop-blur-xl border-r border-white/5 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out">
            <div class="h-full flex flex-col">
                <!-- Logo -->
                <div class="p-6 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <i class="fas fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <div>
                        <span class="text-xl font-bold text-white tracking-tight">EduFlow</span>
                        <p class="text-[10px] text-indigo-400 font-bold tracking-widest uppercase">LMS Dashboard</p>
                    </div>
                </div>

                <!-- User Profile Section -->
                <div id="sidebar-profile"></div>

                <!-- Menu Area -->
                <div class="flex-1 overflow-y-auto px-4 py-6 scrollbar-hide">
                    <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Main Menu</p>
                    <nav id="sidebar-menu" class="space-y-1"></nav>
                </div>

                <!-- Sidebar Footer -->
                <div class="p-4 border-t border-white/5">
                    <div class="rounded-2xl bg-indigo-500/5 p-4 border border-indigo-500/10">
                        <div class="flex items-center gap-3 mb-2">
                            <i class="fas fa-headset text-indigo-400 text-xs"></i>
                            <span class="text-[10px] font-bold text-white tracking-wider uppercase">Support</span>
                        </div>
                        <p class="text-[11px] text-slate-500 mb-2">Butuh bantuan teknis? Hubungi admin sistem kami.</p>
                        <a href="mailto:support@eduflow.com" class="text-[11px] font-bold text-indigo-400 hover:text-indigo-300">HUBUNGI KAMI</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Wrapper -->
        <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            
            <!-- Global Header -->
            <header class="h-20 flex items-center justify-between px-4 lg:px-8 border-b border-white/5 bg-[#0f172a]/40 backdrop-blur-md z-30">
                <div id="header-content" class="flex-1 flex items-center justify-between">
                    <!-- Dynamic Header Content from Router -->
                    <div class="animate-pulse flex space-x-4">
                        <div class="h-10 w-32 bg-slate-700/50 rounded"></div>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div id="main-content" class="flex-1 overflow-y-auto overflow-x-hidden p-4 lg:p-8 custom-scrollbar">
                <!-- Dynamic Content from Dashboard Modules -->
            </div>

            <!-- Background Decorations -->
            <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-500/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 w-64 h-64 bg-violet-600/10 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
        </main>

    </div>

    <!-- JS Scripts -->
    <!-- Essential Configuration & Utilities -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    
    <!-- Dashboard Logic Modules -->
    <script src="js/dashboard-admin.js"></script>
    <script src="js/dashboard-guru.js"></script>
    <script src="js/dashboard-siswa.js"></script>
    
    <!-- SPA Router (Loads last) -->
    <script src="js/router.js"></script>

    <script>
        // Init dashboard
        document.addEventListener('DOMContentLoaded', () => {
            // Secure access
            if (!Auth.requireLogin()) return;

            // Initialize routing
            Router.init();
        });
    </script>
</body>
</html>
